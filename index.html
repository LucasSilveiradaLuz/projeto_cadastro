<!DOCTYPE html>
<html lang="pt-br">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />">
<link rel="stylesheet" href="style.css">

<title>Cadastro</title>

</head>
<body>

 <main id="form_conteudo">

 <div id="form_principal">

 <h1 id="form_titulo">
Cadastro do paciente
 </h1>

<button class ="btn-padrao">
 <i class="fa-solid fa-right-to-bracket"></i>

 </button>

</div>
 <form action="" id = "form">


<div id="input_conteudo">

<div class="input-caixa">

<label for="name" class="form_label">
Primeiro nome
</label>

 <div class = "input-campo">

 <input type="text" id ="nome" class = "form-control" >
 <i class = "fa-regular fa-user"></i>
</div>

</div>
<div class="input-caixa">

<label for="name" class="form_label">

 Sobrenome
 </label>
<div class = "input-campo">

<input type="text" id ="sobrenome" class = "form-control" >

 <i class = "fa-regular fa-user"></i>
 </div>

 </div>

<div class="input-caixa">

<label for="dataDeNascimento" class="form_label">
Data de Nascimento
</label>

 <div class = "input-campo">

 <input type="date" id ="dataDeNascimento" class = "form-control" >

</div>

</div>

 <div class="input-caixa">

<label for="name" class="form_label">
Enfermeiro(a)
 </label>

 <div class = "input-campo">
<input type="text" id ="responsavel" class = "form-control" >
 <i class = "fa-regular fa-user"></i>
   </div>
  </div>
  
 <div class="input-caixa">

<label for="name" class="form_label">
Quarto
 </label>

 <div class = "input-campo">
<input type="number" id ="quarto" class = "form-control" >
 <i class = "fa-regular fa-number"></i>
   </div>
  </div>

<div class="radio">
 <label class="form_label">
 Gênero
  </label>

<div id="generoInput">

  <div class="radio-caixa">

  <input type="radio" id="feminino" name="genero" class="form-control" value="feminino">

 <label for="feminino" class="form_label">Feminino</label>

 </div>

  <div class="radio-caixa">

  <input type="radio" id="masculino" name="genero" class="form-control" value="masculino">

 <label for="masculino" class="form_label">Masculino</label>

  </div>

  <div class="radio-caixa">

  <input type="radio" id="outro" name="genero" class="form-control" value="outro">

 <label for="outro" class="form_label">Outro</label>

  </div>

</div>

</div>
 <div class="radio">
 <label class="form_label">
      Especificações:
    </label>

   <div id="especificacaoInput">

  <div class="radio-caixa">

 <input type="radio" id="alergias" name="especificacao" class="form-control" value="alergias">

 <label for="alergias" class="form_label">Alergias</label>

  </div>

  <div class="radio-caixa">

  <input type="radio" id="TDAH" name="especificacao" class="form-control" value="TDAH">

  <label for="TDAH" class="form_label">TDAH</label>

 </div>

 <div class="radio-caixa">

  <input type="radio" id="autismo" name="especificacao" class="form-control" value="autismo">

  <label for="autismo" class="form_label">Autismo</label>

 </div>

  <div class="radio-caixa">

  <input type="radio" id="idoso" name="especificacao" class="form-control" value="idoso">

 <label for="idoso" class="form_label">Idoso</label>

 </div>

 <div class="radio-caixa">

<input type="radio" id="nenhuma" name="especificacao" class="form-control" value="nenhuma">

<label for="nenhuma" class="form_label">Nenhuma</label>

 </div>

</div>
 
</div>
</div>

<button onclick="cadastro()" type="submit" class="btn-padrao">
<i class="fa-solid fa-check"></i>
 Enviar
</button>
</form>
</main>
</body>
<script src="script.js"></script>
</html>
