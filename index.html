<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cadastro </title>
</head>
<body>
    
    <h1>Cadastro do paciente</h1>
    <div class="container_form">
                <div class="form_grupo">
                    <label for="nome" class="form_label">Nome</label>
                    <input type="text" name="nome" class="form_input" id="nome">
                </div>
                
                <div class="form_grupo">
                    <label for="responsavel" class="form_label">Enfermeira(o)</label>
                    <input type="responsavel" name="responsavel" class="form_input" id="email" >
                </div>
                
                <div class="form_grupo">
                    <label for="datanascimento" class="form_label">Data de Nascimento</label>
                    <input type="date" name="datanascimento" class="form_input" id="datanascimento" placeholder="Data de Nascimento" required>
                </div> 
                     
                <div class="form_grupo">
                    <label for="quarto" class="form_label">Leito</label>
                    <input type="number" name="Quartos" class="form_input" id="quarto" >
                </div>        

                <div class="form_grupo">
                    
                    <label for="especificacoes" class="text">Especificacoes</label>
                    <select name="Especificacoes" class="dropdown" required>          
                        <option selected disabled class="form_select_option" value="">Nenhuma</option>
                        <option value="Autismo" class="form_select_option">Autismo</option>
                        <option value="TDAH" class="form_select_option">TDAH </option>
                        <option value="Idoso" class="form_select_option">Idoso</option>                    
                        <option value="Alergias" class="form_select_option">Alergias</option> 
                         <textarea name="mensagem" id="message" cols="30" rows="3" class="form_input message_input" required></textarea>                   
                        
                    </select>

                </div>

                <div class="form_grupo">

                    <span class="legenda">Sexo:</span>
                    
                    <div class="radio-btn">
                        <input type="radio" class="form_new_input" id="masculino" name="sexo" value="Masculino" required="required">
                        <label for="masculino" class="radio_label form_label"> <span class="radio_new_btn"></span> Masculino</label>
                    </div>

                    <div class="radio-btn">
                        <input type="radio" class="form_new_input" id="feminino" name="sexo" value="Feminino" required="required">
                        <label for="feminino" class="radio_label form_label"> <span class="radio_new_btn"></span> Feminino</label>
                    </div>

                </div>
              
                    <div class="submit">

                      <input type="hidden" name="acao" value="enviar">
                      <button type="submit" name="Submit" class="submit_btn" >Cadastrar</button>
                    
                    </div>
            </form>

    </div><!--container_form-->
</body>
<script src="script.js"></script>
</html>
